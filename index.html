<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方太竞品情报 · 中央指挥舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #0f1115; color: #e2e8f0; }
        .fotile-gold { color: #d4af37; }
        .fotile-bg-gold { background-color: #d4af37; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .login-gradient { background: radial-gradient(circle at center, #1e293b 0%, #0f1115 100%); }
        .report-card:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: #d4af37; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 登录界面 -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center login-gradient">
        <div class="glass-card p-8 rounded-2xl w-full max-w-md text-center shadow-2xl">
            <div class="mb-6">
                <div class="w-20 h-20 fotile-bg-gold rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">
                    <svg class="w-10 h-10 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-widest text-white">竞品情报 · 指挥舱</h1>
                <p class="text-slate-400 mt-2 text-sm">FOTILE STRATEGIC INTELLIGENCE</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="password" placeholder="请输入访问权限口令" 
                    class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-center focus:outline-none focus:border-gold-500 transition-all">
                <button onclick="handleLogin()" id="login-btn"
                    class="w-full fotile-bg-gold text-slate-900 font-bold py-3 rounded-lg hover:opacity-90 transition-all shadow-lg active:scale-95">
                    验证身份并进入
                </button>
                <p id="error-msg" class="text-red-400 text-xs hidden">口令无效，请重新输入或咨询管理员</p>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000 p-6 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8">
            <div>
                <h2 class="text-3xl font-bold text-white tracking-tight">
                    方太竞品情报 <span class="fotile-gold">中央指挥舱</span>
                </h2>
                <p class="text-slate-400 mt-1 uppercase text-xs tracking-widest">Real-time Competitor Patent Analysis Dashboard</p>
            </div>
            <div class="mt-6 md:mt-0 flex gap-4">
                <button onclick="filterReports('ALL')" class="px-4 py-2 rounded-full glass-card text-xs hover:fotile-bg-gold hover:text-slate-900 transition-all">全量</button>
                <button onclick="filterReports('ROBAM')" class="px-4 py-2 rounded-full glass-card text-xs hover:fotile-bg-gold hover:text-slate-900 transition-all">老板电器</button>
                <button onclick="filterReports('HAIER')" class="px-4 py-2 rounded-full glass-card text-xs hover:fotile-bg-gold hover:text-slate-900 transition-all">海尔/卡萨帝</button>
            </div>
        </header>

        <!-- 统计概览 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 rounded-xl">
                <p class="text-slate-400 text-xs mb-2">累计情报简报</p>
                <p class="text-4xl font-bold fotile-gold" id="stat-total">--</p>
            </div>
            <div class="glass-card p-6 rounded-xl border-l-4 border-red-500">
                <p class="text-slate-400 text-xs mb-2">高威胁专利发现</p>
                <p class="text-4xl font-bold text-red-500">28+</p>
            </div>
            <div class="glass-card p-6 rounded-xl">
                <p class="text-slate-400 text-xs mb-2">情报更新日期</p>
                <p class="text-xl font-bold text-white uppercase" id="stat-last-update">--</p>
            </div>
        </div>

        <!-- 报告矩阵 -->
        <div id="report-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            <!-- 动态生成 -->
        </div>

        <footer class="mt-20 text-center text-slate-500 text-xs py-8 border-t border-slate-800">
            FOTILE Strategic Department © 2026 | 系统版本 v1.0.0-Sentinel
        </footer>
    </div>

    <script>
        let allReports = [];

        async function handleLogin() {
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerText = '正在校验加密指令...';

            try {
                // 尝试获取加密的索引数据
                const response = await fetch('data.bin');
                if (!response.ok) throw new Error('Data file not found');
                const encryptedData = await response.text();

                // 尝试解密
                const bytes = CryptoJS.AES.decrypt(encryptedData, password);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!decryptedStr) throw new Error('Decryption failed');

                allReports = JSON.parse(decryptedStr);
                
                // 登录成功
                document.getElementById('login-screen').classList.add('hidden');
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
                
                renderDashboard(allReports);
            } catch (err) {
                console.error(err);
                error.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = '验证身份并进入';
            }
        }

        function renderDashboard(reports) {
            const grid = document.getElementById('report-grid');
            grid.innerHTML = '';
            
            reports.sort((a, b) => new Date(b.date) - new Date(a.date));

            reports.forEach(rep => {
                const card = `
                    <div class="glass-card rounded-2xl overflow-hidden report-card cursor-pointer" onclick="window.open('${rep.path}', '_blank')">
                        <div class="h-32 fotile-bg-gold/10 flex items-center justify-center relative overflow-hidden">
                            <div class="absolute top-4 right-4 bg-slate-900/80 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest text-slate-300">
                                ${rep.brand}
                            </div>
                            <svg class="w-12 h-12 fotile-gold opacity-30" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9 2a2 2 0 00-2 2v8a2 2 0 002 2h6a2 2 0 002-2V6.414A2 2 0 0016.414 5L14 2.586A2 2 0 0012.586 2H9z"></path>
                                <path d="M3 8a2 2 0 012-2v10h8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"></path>
                            </svg>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${rep.date}</span>
                                <span class="bg-red-500/20 text-red-500 px-2 py-0.5 rounded-full text-[9px] font-black uppercase">Level ${rep.threat || '3'}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-4 line-clamp-2 leading-snug">
                                ${rep.title}
                            </h3>
                            <div class="flex items-center text-xs text-slate-400 group">
                                <span class="group-hover:text-gold transition-all">查阅完整情报报告</span>
                                <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });

            // 更新统计
            document.getElementById('stat-total').innerText = reports.length;
            if (reports.length > 0) {
                document.getElementById('stat-last-update').innerText = reports[0].date;
            }
        }

        function filterReports(brand) {
            if (brand === 'ALL') {
                renderDashboard(allReports);
            } else {
                const filtered = allReports.filter(r => r.brand_key === brand);
                renderDashboard(filtered);
            }
        }

        // 监听回车键
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
